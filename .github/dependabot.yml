version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/guardrails-llm-deployment"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "build"
      prefix-development: "build"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
      include: "scope"
